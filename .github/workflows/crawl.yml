name: Weekly Event Crawl

on:
  schedule:
    - cron: "0 7 * * 1" # Montag 07:00 UTC
    - cron: "0 7 * * 4" # Donnerstag 07:00 UTC
  workflow_dispatch: # Manueller Trigger zum Testen

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger crawl
        run: |
          curl -X POST https://${{ secrets.VERCEL_APP_URL }}/api/crawl \
            -H "Authorization: Bearer ${{ secrets.CRAWL_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            --max-time 90
